<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <link rel="stylesheet" href="https://use.typekit.net/yjp7kef.css" />
  <link rel="stylesheet" href="https://use.typekit.net/phb7xgn.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Tubes cursor canvas -->
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <!-- Blur canvas -->
  <canvas id="blur-canvas" style="
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 5;
  "></canvas>

  <!-- Mirror canvas -->
  <canvas id="mirror-canvas" style="
    position: fixed;
    pointer-events: none;
    z-index: 6;
    opacity: 0.45;
  "></canvas>

  <!-- SVG маска -->
  <svg id="gt-defs"
       style="position:absolute;top:0;left:0;pointer-events:none;overflow:visible;width:0;height:0;"
       xmlns="http://www.w3.org/2000/svg">
    <defs>
      <mask id="gt-mask" maskUnits="userSpaceOnUse">
        <text id="gt-mask-text" fill="white"
          font-family="'futura-pt', sans-serif"
          font-weight="700">Design</text>
      </mask>
    </defs>
  </svg>

  <!-- Текст -->
  <div id="gt-wrap">
    <div id="gt-spec" style="
      position: absolute;
      inset: 0;
      -webkit-mask: url(#gt-mask);
      mask: url(#gt-mask);
      background: linear-gradient(
        150deg,
        rgba(255,255,255,0.45) 0%,
        rgba(255,255,255,0.10) 40%,
        transparent 58%,
        rgba(255,255,255,0.06) 100%
      );
      pointer-events: none;
      z-index: 2;
    "></div>

    <svg id="gt-svg" style="display:block; position:relative; z-index:1;"
         fill="none" xmlns="http://www.w3.org/2000/svg">
      <text id="gt-text"
        font-family="'futura-pt', sans-serif"
        font-weight="700"
        fill="rgba(255,255,255,0.0)"
        stroke="rgba(255,255,255,0.45)"
        stroke-width="1.5"
        paint-order="stroke">Design</text>
    </svg>
  </div>

  <script>
  (function () {
    var FONT_SIZE  = 200;
    var LETTER_SPC = 0.6;
    var TEXT       = "Design";
    var FONT_STR   = "700 " + FONT_SIZE + "px 'futura-pt', sans-serif";

    var srcCanvas    = document.getElementById('canvas');
    var blurCanvas   = document.getElementById('blur-canvas');
    var mirrorCanvas = document.getElementById('mirror-canvas');
    var bctx         = blurCanvas.getContext('2d');
    var mctx         = mirrorCanvas.getContext('2d');

    var MIRROR_H_RATIO = 0.5; // висота відзеркалення відносно тексту

    function resize() {
      blurCanvas.width  = window.innerWidth;
      blurCanvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function init() {
      var mc = document.createElement("canvas");
      var mx = mc.getContext("2d");
      mx.font = FONT_STR;
      var TW   = Math.ceil(mx.measureText(TEXT).width) + Math.ceil(FONT_SIZE * 0.3);
      var TH   = Math.ceil(FONT_SIZE * 1.6);
      var BASE = Math.ceil(FONT_SIZE * 1.1);

      var wrap = document.getElementById("gt-wrap");
      wrap.style.width  = TW + "px";
      wrap.style.height = TH + "px";

      var svg = document.getElementById("gt-svg");
      svg.setAttribute("width", TW);
      svg.setAttribute("height", TH);
      svg.setAttribute("viewBox", "0 0 " + TW + " " + TH);

      ["gt-text", "gt-mask-text"].forEach(function(id) {
        var el = document.getElementById(id);
        el.setAttribute("x", "0");
        el.setAttribute("y", BASE);
        el.setAttribute("font-size", FONT_SIZE);
        el.setAttribute("letter-spacing", LETTER_SPC);
      });

      var defsSvg = document.getElementById("gt-defs");
      defsSvg.setAttribute("width", TW);
      defsSvg.setAttribute("height", TH);
    }

    function drawBlur() {
      var W = blurCanvas.width;
      var H = blurCanvas.height;
      bctx.clearRect(0, 0, W, H);

      var wrap = document.getElementById('gt-wrap');
      var rect = wrap.getBoundingClientRect();

      var tmp = document.createElement('canvas');
      tmp.width  = W;
      tmp.height = H;
      var tctx = tmp.getContext('2d');
      tctx.filter = 'blur(14px) invert(1)';
      try { tctx.drawImage(srcCanvas, 0, 0, W, H); } catch(e) {}

      bctx.save();
      bctx.drawImage(tmp, 0, 0);
      bctx.globalCompositeOperation = 'destination-in';
      bctx.font = FONT_STR;
      bctx.fillStyle = 'white';
      bctx.letterSpacing = LETTER_SPC + 'px';
      bctx.fillText(TEXT, rect.left, rect.top + Math.ceil(FONT_SIZE * 1.1));
      bctx.restore();

      // ── Відзеркалення ──────────────────────────────
      var TW = rect.width;
      var TH = rect.height;
      var MH = Math.ceil(TH * MIRROR_H_RATIO); // висота дзеркала

      mirrorCanvas.width  = TW;
      mirrorCanvas.height = MH;
      mirrorCanvas.style.left = rect.left + 'px';
      mirrorCanvas.style.top  = (rect.bottom + 4) + 'px'; // 4px відступ під текстом

      mctx.clearRect(0, 0, TW, MH);
      mctx.save();

      // Перевертаємо — беремо нижню частину тексту знизу вгору
      mctx.translate(0, MH);
      mctx.scale(1, -1);

      // Копіюємо blur-canvas у перевернутому вигляді
      mctx.drawImage(
        blurCanvas,
        rect.left, rect.top, TW, MH,
        0, 0, TW, MH
      );

      // Копіюємо SVG контур тексту
      var gtSvg = document.getElementById('gt-svg');
      var svgStr = new XMLSerializer().serializeToString(gtSvg);
      var img = new Image();
      img.onload = function () {
        mctx.drawImage(img, 0, 0, TW, TH, 0, 0, TW, MH);
      };
      img.src = 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svgStr);

      mctx.restore();

      // Градієнт-маска: відображення зникає донизу
      mctx.save();
      var grad = mctx.createLinearGradient(0, 0, 0, MH);
      grad.addColorStop(0,   'rgba(0,0,0,1)');
      grad.addColorStop(1,   'rgba(0,0,0,0)');
      mctx.globalCompositeOperation = 'destination-in';
      mctx.fillStyle = grad;
      mctx.fillRect(0, 0, TW, MH);
      mctx.restore();
      // ───────────────────────────────────────────────

      requestAnimationFrame(drawBlur);
    }

    document.fonts.ready.then(function () {
      requestAnimationFrame(init);
      setTimeout(drawBlur, 300);
    });

    window.addEventListener("resize", function () { requestAnimationFrame(init); });
  })();
  </script>

  <script type="module" src="script.js"></script>

</body>
</html>
