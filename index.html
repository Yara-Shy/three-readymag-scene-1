<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <link rel="stylesheet" href="https://use.typekit.net/yjp7kef.css" />
  <link rel="stylesheet" href="https://use.typekit.net/phb7xgn.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Tubes cursor canvas -->
  <canvas id="canvas"></canvas>

  <!-- Blur canvas — малюється програмно поверх tubes -->
  <canvas id="blur-canvas" style="
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 5;
  "></canvas>

  <!-- SVG маска для форми тексту -->
  <svg id="gt-defs"
       style="position:absolute;top:0;left:0;pointer-events:none;overflow:visible;width:0;height:0;"
       xmlns="http://www.w3.org/2000/svg">
    <defs>
      <mask id="gt-mask" maskUnits="userSpaceOnUse">
        <text id="gt-mask-text" fill="white"
          font-family="'futura-pt', sans-serif"
          font-weight="700">Design</text>
      </mask>
    </defs>
  </svg>

  <!-- Текст (тільки SVG контур, blur йде з blur-canvas) -->
  <div id="gt-wrap" style="position:relative; display:inline-block; line-height:1; z-index:10;">

    <!-- Відблиск поверх -->
    <div id="gt-spec" style="
      position:absolute; inset:0;
      -webkit-mask: url(#gt-mask);
      mask: url(#gt-mask);
      background: linear-gradient(
        150deg,
        rgba(255,255,255,0.45) 0%,
        rgba(255,255,255,0.10) 40%,
        transparent 58%,
        rgba(255,255,255,0.06) 100%
      );
      pointer-events:none;
      z-index: 2;
    "></div>

    <svg id="gt-svg" style="display:block; position:relative; z-index:1;"
         fill="none" xmlns="http://www.w3.org/2000/svg">
      <text id="gt-text"
        font-family="'futura-pt', sans-serif"
        font-weight="700"
        fill="rgba(255,255,255,0.0)"
        stroke="rgba(255,255,255,0.45)"
        stroke-width="1.5"
        paint-order="stroke">Design</text>
    </svg>
  </div>

  <script>
  (function () {
    var FONT_SIZE  = 200;
    var LETTER_SPC = 0.6;
    var TEXT       = "Design";
    var FONT_STR   = "700 " + FONT_SIZE + "px 'futura-pt', sans-serif";

    var srcCanvas  = document.getElementById('canvas');
    var blurCanvas = document.getElementById('blur-canvas');
    var bctx       = blurCanvas.getContext('2d');

    function resize() {
      blurCanvas.width  = window.innerWidth;
      blurCanvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function init() {
      var mc = document.createElement("canvas");
      var mx = mc.getContext("2d");
      mx.font = FONT_STR;
      var TW   = Math.ceil(mx.measureText(TEXT).width) + Math.ceil(FONT_SIZE * 0.3);
      var TH   = Math.ceil(FONT_SIZE * 1.6);
      var BASE = Math.ceil(FONT_SIZE * 1.1);

      var wrap = document.getElementById("gt-wrap");
      wrap.style.width  = TW + "px";
      wrap.style.height = TH + "px";

      var svg = document.getElementById("gt-svg");
      svg.setAttribute("width", TW);
      svg.setAttribute("height", TH);
      svg.setAttribute("viewBox", "0 0 " + TW + " " + TH);

      ["gt-text", "gt-mask-text"].forEach(function(id) {
        var el = document.getElementById(id);
        el.setAttribute("x", "0");
        el.setAttribute("y", BASE);
        el.setAttribute("font-size", FONT_SIZE);
        el.setAttribute("letter-spacing", LETTER_SPC);
      });

      var defsSvg = document.getElementById("gt-defs");
      defsSvg.setAttribute("width", TW);
      defsSvg.setAttribute("height", TH);
    }

    // Малює blur з tubes canvas по формі тексту
    function drawBlur() {
      var W = blurCanvas.width;
      var H = blurCanvas.height;
      bctx.clearRect(0, 0, W, H);

      var wrap = document.getElementById('gt-wrap');
      var rect = wrap.getBoundingClientRect();

      // Зона тексту
      var x = rect.left, y = rect.top, w = rect.width, h = rect.height;

      bctx.save();

      // Вирізаємо по прямокутнику тексту
      bctx.beginPath();
      bctx.rect(x, y, w, h);
      bctx.clip();

      // Blur + invert з tubes canvas
      bctx.filter = 'blur(14px) invert(1)';
      try {
        bctx.drawImage(srcCanvas, 0, 0, W, H);
      } catch(e) {}

      // Напівпрозорий glass overlay
      bctx.filter = 'none';
      bctx.fillStyle = 'rgba(255,255,255,0.05)';
      bctx.fillRect(x, y, w, h);

      bctx.restore();

      requestAnimationFrame(drawBlur);
    }

    document.fonts.ready.then(function () {
      requestAnimationFrame(init);
      setTimeout(drawBlur, 300);
    });

    window.addEventListener("resize", function () { requestAnimationFrame(init); });
  })();
  </script>

  <script type="module" src="script.js"></script>

</body>
</html>
