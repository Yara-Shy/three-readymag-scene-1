  <!-- SVG текст з liquid glass -->
  <svg id="gt-svg-outer" style="
    position: relative;
    z-index: 10;
    overflow: visible;
  " fill="none" xmlns="http://www.w3.org/2000/svg">
    <text id="gt-text"
      font-family="'futura-pt', sans-serif"
      font-weight="700"
      filter="url(#liquid-glass-text)">Design</text>
  </svg>

  <script>
  (function () {
    var FONT_SIZE  = 200;
    var LETTER_SPC = 0.6;
    var TEXT       = "Design";
    var FONT_STR   = "700 " + FONT_SIZE + "px 'futura-pt', sans-serif";

    var srcCanvas    = document.getElementById('canvas');
    var packedCanvas = document.getElementById('packed-canvas');
    var pctx         = packedCanvas.getContext('2d');

    function resize() {
      packedCanvas.width  = window.innerWidth;
      packedCanvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    function init() {
      var mc = document.createElement("canvas");
      var mx = mc.getContext("2d");
      mx.font = FONT_STR;
      var TW   = Math.ceil(mx.measureText(TEXT).width) + Math.ceil(FONT_SIZE * 0.3);
      var TH   = Math.ceil(FONT_SIZE * 1.6);
      var BASE = Math.ceil(FONT_SIZE * 1.1);

      var outerSvg = document.getElementById('gt-svg-outer');
      outerSvg.setAttribute("width",   TW);
      outerSvg.setAttribute("height",  TH);
      outerSvg.setAttribute("viewBox", "0 0 " + TW + " " + TH);

      var visText = document.getElementById("gt-text");
      visText.setAttribute("x",              "0");
      visText.setAttribute("y",              BASE);
      visText.setAttribute("font-size",      FONT_SIZE);
      visText.setAttribute("letter-spacing", LETTER_SPC);
      // Колір тексту — упакований фон буде переданий через fill
      visText.setAttribute("fill", "white");
    }

    // Пакує пікселі canvas у 7-bit формат для SVG фільтра
    function packAndDraw() {
      var W = packedCanvas.width;
      var H = packedCanvas.height;

      // Крок 1: малюємо інвертований tubes canvas у tmp
      var tmp = document.createElement('canvas');
      tmp.width = W; tmp.height = H;
      var tctx = tmp.getContext('2d');
      tctx.filter = 'invert(1)';
      try { tctx.drawImage(srcCanvas, 0, 0, W, H); } catch(e) {}

      // Крок 2: пакуємо у 7-bit (ділимо кожен канал на 2 щоб вмістити маску в молодший біт)
      var imgData = tctx.getImageData(0, 0, W, H);
      var d = imgData.data;
      for (var i = 0; i < d.length; i += 4) {
        d[i]   = (d[i]   >> 1) & 0xFE; // R: верхні 7 біт, молодший = 0 (фон)
        d[i+1] = (d[i+1] >> 1) & 0xFE; // G
        d[i+2] = (d[i+2] >> 1) & 0xFE; // B
      }
      pctx.putImageData(imgData, 0, 0);

      requestAnimationFrame(packAndDraw);
    }

    document.fonts.ready.then(function () {
      requestAnimationFrame(init);
      setTimeout(packAndDraw, 300);
    });

    window.addEventListener("resize", function () { requestAnimationFrame(init); });
  })();
  </script>
