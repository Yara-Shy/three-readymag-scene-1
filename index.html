<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title></title>
  <link rel="stylesheet" href="https://use.typekit.net/yjp7kef.css" />
  <link rel="stylesheet" href="https://use.typekit.net/phb7xgn.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <!-- Основний glass canvas (blur по формі тексту) -->
  <canvas id="blur-canvas" style="
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 5;
  "></canvas>

  <!-- Відблиск поверх (окремий canvas) -->
  <canvas id="spec-canvas" style="
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none; z-index: 7;
  "></canvas>

  <!-- SVG контур тексту -->
  <svg id="gt-svg" style="
    position: relative; z-index: 6;
    display: block; overflow: visible;
  " fill="none" xmlns="http://www.w3.org/2000/svg">
    <text id="gt-text"
      font-family="'futura-pt', sans-serif"
      font-weight="700"
      fill="rgba(255,255,255,0.0)"
      stroke="rgba(255,255,255,0.5)"
      stroke-width="1.5"
      paint-order="stroke">Design</text>
  </svg>

  <script>
  (function () {
    var FONT_SIZE  = 200;
    var LETTER_SPC = 0.6;
    var TEXT       = "Design";
    var FONT_STR   = "700 " + FONT_SIZE + "px 'futura-pt', sans-serif";

    var srcCanvas  = document.getElementById('canvas');
    var blurCanvas = document.getElementById('blur-canvas');
    var specCanvas = document.getElementById('spec-canvas');
    var bctx = blurCanvas.getContext('2d');
    var sctx = specCanvas.getContext('2d');

    var TW, TH, BASE, textX, textY;

    function resize() {
      blurCanvas.width  = window.innerWidth;
      blurCanvas.height = window.innerHeight;
      specCanvas.width  = window.innerWidth;
      specCanvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', function() { resize(); init(); });

    function init() {
      var mc = document.createElement("canvas");
      var mx = mc.getContext("2d");
      mx.font = FONT_STR;
      TW   = Math.ceil(mx.measureText(TEXT).width) + Math.ceil(FONT_SIZE * 0.3);
      TH   = Math.ceil(FONT_SIZE * 1.6);
      BASE = Math.ceil(FONT_SIZE * 1.1);

      var svg = document.getElementById("gt-svg");
      svg.setAttribute("width",   TW);
      svg.setAttribute("height",  TH);
      svg.setAttribute("viewBox", "0 0 " + TW + " " + TH);

      var visText = document.getElementById("gt-text");
      visText.setAttribute("x",              "0");
      visText.setAttribute("y",              BASE);
      visText.setAttribute("font-size",      FONT_SIZE);
      visText.setAttribute("letter-spacing", LETTER_SPC);

      // Позиція тексту на екрані
      var rect = svg.getBoundingClientRect();
      textX = rect.left;
      textY = rect.top + BASE;
    }

    function drawTextMask(ctx) {
      ctx.font = FONT_STR;
      ctx.fillStyle = 'white';
      ctx.letterSpacing = LETTER_SPC + 'px';
      ctx.fillText(TEXT, textX, textY);
    }

    function draw() {
      var W = blurCanvas.width;
      var H = blurCanvas.height;

      // ── 1. BLUR GLASS ───────────────────────────────
      bctx.clearRect(0, 0, W, H);

      // Розмите + інвертоване зображення tubes
      var tmp = document.createElement('canvas');
      tmp.width = W; tmp.height = H;
      var tctx = tmp.getContext('2d');
      tctx.filter = 'blur(18px) invert(1)';
      try { tctx.drawImage(srcCanvas, 0, 0, W, H); } catch(e) {}

      // Легкий світлий overlay для ефекту скла
      tctx.filter = 'none';
      tctx.fillStyle = 'rgba(255,255,255,0.08)';
      tctx.fillRect(0, 0, W, H);

      bctx.save();
      bctx.drawImage(tmp, 0, 0);
      // Маска по формі тексту
      bctx.globalCompositeOperation = 'destination-in';
      drawTextMask(bctx);
      bctx.restore();

      // ── 2. ВІДБЛИСК ─────────────────────────────────
      sctx.clearRect(0, 0, W, H);
      sctx.save();

      // Малюємо форму тексту
      drawTextMask(sctx);

      // Gradient specular highlight
      sctx.globalCompositeOperation = 'source-in';
      var rect = document.getElementById('gt-svg').getBoundingClientRect();
      var grad = sctx.createLinearGradient(
        rect.left,          rect.top,
        rect.left + TW * 0.6, rect.top + TH
      );
      grad.addColorStop(0,    'rgba(255,255,255,0.55)');
      grad.addColorStop(0.3,  'rgba(255,255,255,0.15)');
      grad.addColorStop(0.55, 'rgba(255,255,255,0.0)');
      grad.addColorStop(1,    'rgba(255,255,255,0.07)');
      sctx.fillStyle = grad;
      sctx.fillRect(rect.left, rect.top, TW, TH);

      sctx.restore();

      requestAnimationFrame(draw);
    }

    document.fonts.ready.then(function () {
      requestAnimationFrame(init);
      setTimeout(function() {
        // Оновлюємо координати після рендеру
        var rect = document.getElementById('gt-svg').getBoundingClientRect();
        textX = rect.left;
        textY = rect.top + BASE;
        draw();
      }, 400);
    });
  })();
  </script>

  <script type="module" src="script.js"></script>

</body>
</html>
